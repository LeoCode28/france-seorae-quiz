{% extends "base.html" %}
{% block score_header %}{{ score }} {{ t('score_pts') }}{% endblock %}

{% block content %}
<div class="ornement">🔢</div>
<div class="card">
  <h1>{{ t('code_title') }}</h1>
  <p class="subtitle">{{ t('code_subtitle') }}</p>

  {% if erreur %}
  <div class="alerte">{{ erreur }}</div>
  {% endif %}

  <form method="POST" action="/question">
    <div class="form-group">
      <label>{{ t('code_label') }}</label>
      <input
        type="text"
        inputmode="numeric"
        pattern="[0-9]{4}"
        name="code"
        class="code-input"
        placeholder="{{ t('code_placeholder') }}"
        maxlength="4"
        required
        autofocus
        autocomplete="off"
        value="{{ code_prefill or '' }}"
      />
    </div>
    <button type="submit" class="btn btn-primary">{{ t('code_validate') }}</button>
  </form>

  <div style="margin-top:14px;">
    <a href="/carte" class="btn btn-secondary">{{ t('back_map') }}</a>
  </div>
</div>

<div style="text-align:center; margin-top:18px; color:var(--gris); font-size:0.84rem;">
  {{ t('code_hint') }}
</div>
{% endblock %}
